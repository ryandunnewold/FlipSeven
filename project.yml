name: FlipSeven
options:
  bundleIdPrefix: com.dunnewold
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  swift: "6.0"
settings:
  base:
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_VERSION: "6.0"
    INFOPLIST_FILE: Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    GENERATE_INFOPLIST_FILE: NO
targets:
  FlipSeven:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dunnewold.FlipSeven
